<svg viewBox="0 0 920 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Device Farm architecture">
  <title>Device Farm architecture</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
  </defs>

  <style>
    .node { fill: #161b22; stroke: #444c56; }
    .title { fill: #e6edf3; font-size: 14px; font-weight: 600; }
    .item { fill: #adbac7; font-size: 12.5px; }
    .label { fill: #8b949e; font-size: 12px; }
    .edge { stroke: #8b949e; stroke-width: 1.3; fill: none; marker-end: url(#arrow); }
  </style>

  <!-- clients -->
  <rect class="node" x="60" y="24" width="260" height="56" rx="10"/>
  <text class="title" x="190" y="57" text-anchor="middle">dfarm CLI / REST clients</text>

  <rect class="node" x="590" y="24" width="260" height="56" rx="10"/>
  <text class="title" x="720" y="57" text-anchor="middle">Dashboard (browser)</text>

  <!-- web -->
  <rect class="node" x="230" y="170" width="400" height="130" rx="10" stroke="#58a6ff"/>
  <text class="title" x="430" y="200" text-anchor="middle">apps/web — Next.js</text>
  <text class="item" x="266" y="230">REST API</text>
  <text class="item" x="266" y="254">job queue + Inngest functions</text>
  <text class="item" x="266" y="278">realtime (SSE)</text>

  <!-- postgres cylinder -->
  <path class="node" d="M720,208 A90,16 0 0 1 900,208 V292 A90,16 0 0 1 720,292 Z"/>
  <ellipse cx="810" cy="208" rx="90" ry="16" fill="#161b22" stroke="#444c56"/>
  <text class="title" x="810" y="248" text-anchor="middle">Postgres</text>
  <text class="item" x="810" y="270" text-anchor="middle">devices · jobs · runs</text>
  <text class="item" x="810" y="288" text-anchor="middle">leases = device mutex</text>

  <!-- agent -->
  <rect class="node" x="230" y="392" width="400" height="126" rx="10" stroke="#3fb950"/>
  <text class="title" x="430" y="422" text-anchor="middle">apps/agent — Bun daemon</text>
  <text class="item" x="266" y="450">simctl / devicectl / adb discovery</text>
  <text class="item" x="266" y="472">maestro test runs</text>
  <text class="item" x="266" y="494">screenshots ~1fps</text>

  <!-- devices -->
  <rect class="node" x="105" y="572" width="190" height="48" rx="10"/>
  <text class="title" x="200" y="601" text-anchor="middle">iOS simulators</text>
  <rect class="node" x="365" y="572" width="190" height="48" rx="10"/>
  <text class="title" x="460" y="601" text-anchor="middle">Android emulators</text>
  <rect class="node" x="625" y="572" width="190" height="48" rx="10"/>
  <text class="title" x="720" y="601" text-anchor="middle">physical devices</text>

  <!-- clients -> web -->
  <path class="edge" d="M190,80 V126 H330 V164"/>
  <text class="label" x="200" y="118">submit jobs / reserve (HTTP)</text>
  <path class="edge" d="M720,80 V126 H540 V164"/>
  <text class="label" x="732" y="118">live updates (SSE)</text>

  <!-- web <-> postgres -->
  <path class="edge" d="M630,242 H714"/>

  <!-- web <-> agent -->
  <path class="edge" d="M530,300 V386"/>
  <text class="label" x="544" y="348">/run · /screenshot · /exec · /boot</text>
  <path class="edge" d="M330,392 V306"/>
  <text class="label" x="316" y="336" text-anchor="end">device report every 5s</text>
  <text class="label" x="316" y="352" text-anchor="end">(discovery = heartbeat)</text>

  <!-- agent -> devices -->
  <path class="edge" d="M300,518 V540 H200 V566"/>
  <path class="edge" d="M460,518 V566"/>
  <path class="edge" d="M560,518 V540 H720 V566"/>
  <text class="label" x="448" y="558" text-anchor="end">local device control</text>
</svg>
