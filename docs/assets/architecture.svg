<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Device Farm architecture</title>
  <desc id="desc">dfarm clients and dashboard connect to the Next.js web app, which coordinates Postgres leases, Inngest jobs, and the Bun device agent for local iOS, Android, and physical devices.</desc>
  <defs>
    <marker id="arrowhead" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#768390"/>
    </marker>
    <style>
      text{font-family:-apple-system,'Segoe UI',sans-serif}
      .node{fill:#161b22;stroke:#444c56;stroke-width:1}
      .web{stroke:#58a6ff}
      .agent{stroke:#3fb950}
      .name{fill:#e6edf3;font-size:14px;font-weight:600}
      .sub{fill:#e6edf3;font-size:13px}
      .label{fill:#768390;font-size:12px}
      .arrow{fill:none;stroke:#768390;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowhead)}
      .cyl{fill:none;stroke:#444c56;stroke-width:1}
    </style>
  </defs>

  <g>
    <rect class="node" x="45" y="42" width="230" height="72" rx="10"/>
    <text class="name" x="160" y="82" text-anchor="middle">dfarm CLI / REST clients</text>
  </g>

  <g>
    <rect class="node" x="645" y="42" width="230" height="72" rx="10"/>
    <text class="name" x="760" y="82" text-anchor="middle">Dashboard (browser)</text>
  </g>

  <g>
    <rect class="node web" x="245" y="168" width="430" height="120" rx="10"/>
    <text class="name" x="460" y="202" text-anchor="middle">apps/web — Next.js</text>
    <text class="sub" x="284" y="232">REST API</text>
    <text class="sub" x="284" y="256">queue + Inngest functions</text>
    <text class="sub" x="284" y="280">realtime (SSE)</text>
  </g>

  <g>
    <rect class="node" x="725" y="185" width="150" height="96" rx="10"/>
    <text class="name" x="800" y="234" text-anchor="middle">Postgres</text>
    <text class="sub" x="800" y="258" text-anchor="middle">leases = device mutex</text>
  </g>

  <g>
    <rect class="node agent" x="280" y="355" width="360" height="112" rx="10"/>
    <text class="name" x="460" y="389" text-anchor="middle">apps/agent — Bun daemon</text>
    <text class="sub" x="320" y="419">simctl / devicectl / adb</text>
    <text class="sub" x="320" y="442">maestro runs</text>
    <text class="sub" x="320" y="459">screenshots ~1fps</text>
  </g>

  <g>
    <rect class="node" x="70" y="505" width="190" height="40" rx="10"/>
    <text class="name" x="165" y="530" text-anchor="middle">iOS simulators</text>
  </g>
  <g>
    <rect class="node" x="365" y="505" width="190" height="40" rx="10"/>
    <text class="name" x="460" y="530" text-anchor="middle">Android emulators</text>
  </g>
  <g>
    <rect class="node" x="660" y="505" width="190" height="40" rx="10"/>
    <text class="name" x="755" y="530" text-anchor="middle">physical devices</text>
  </g>

  <path class="arrow" d="M160 114 V145 H355 V168"/>
  <text class="label" x="170" y="138">submit jobs / reserve (HTTP)</text>

  <path class="arrow" d="M760 114 V145 H565 V168"/>
  <text class="label" x="610" y="138">live updates (SSE)</text>

  <path class="arrow" d="M675 228 H725"/>
  <text class="label" x="668" y="218" text-anchor="end">devices / jobs / leases</text>

  <path class="arrow" d="M500 288 V355"/>
  <text class="label" x="512" y="326">/run /screenshot /exec /boot</text>

  <path class="arrow" d="M320 355 V320 H215 V232 H245"/>
  <text class="label" x="35" y="314">device report every 5s (discovery = heartbeat)</text>

  <path class="arrow" d="M390 467 V480 H165 V505"/>
  <path class="arrow" d="M460 467 V505"/>
  <path class="arrow" d="M530 467 V480 H755 V505"/>
  <text class="label" x="575" y="497" text-anchor="middle">local device control</text>
</svg>
